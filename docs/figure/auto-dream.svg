<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">ReMe auto dream flow</title>
  <desc id="desc">A left-to-right auto dream flow from changed daily notes to digest integration, interest topic writing, catalog checkpointing, and proactive reads.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #607086; }
      .step-num { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .step-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .step-subtitle { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #607086; }
      .chip-title { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #253246; }
      .chip-text { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #627087; }
      .note { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5d6a7d; }
      .panel { fill: #ffffff; stroke: #d7dde7; stroke-width: 1.2; rx: 10; ry: 10; }
      .chip { fill: #f9fafc; stroke: #dfe5ee; stroke-width: 1; rx: 8; ry: 8; }
      .badge { fill: #44546a; }
      .arrow { stroke: #8794a8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #a3adbd; stroke-width: 1.6; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow-soft); }
      .line { stroke: #e1e6ee; stroke-width: 1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#8794a8"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#a3adbd"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="680"/>
  <text class="title" x="600" y="54" text-anchor="middle">Auto Dream</text>
  <text class="subtitle" x="600" y="80" text-anchor="middle">Scan changed daily memory, integrate reusable units into digest, then expose fresh proactive topics.</text>

  <rect class="panel" x="54" y="132" width="224" height="300"/>
  <circle class="badge" cx="88" cy="170" r="15"/>
  <text class="step-num" x="88" y="174" text-anchor="middle">1</text>
  <text class="step-title" x="116" y="176">Extract</text>
  <text class="step-subtitle" x="82" y="206">dream_extract_step</text>
  <rect class="chip" x="82" y="232" width="168" height="44"/>
  <text class="chip-title" x="166" y="251" text-anchor="middle">refresh day index</text>
  <text class="chip-text" x="166" y="269" text-anchor="middle">daily/&lt;date&gt;.md</text>
  <rect class="chip" x="82" y="296" width="168" height="44"/>
  <text class="chip-title" x="166" y="315" text-anchor="middle">compare catalog</text>
  <text class="chip-text" x="166" y="333" text-anchor="middle">changed daily markdown</text>
  <rect class="chip" x="82" y="360" width="168" height="44"/>
  <text class="chip-title" x="166" y="379" text-anchor="middle">LLM extract</text>
  <text class="chip-text" x="166" y="397" text-anchor="middle">units + topic candidates</text>

  <rect class="panel" x="326" y="132" width="224" height="300"/>
  <circle class="badge" cx="360" cy="170" r="15"/>
  <text class="step-num" x="360" y="174" text-anchor="middle">2</text>
  <text class="step-title" x="388" y="176">Integrate</text>
  <text class="step-subtitle" x="354" y="206">dream_integrate_step</text>
  <rect class="chip" x="354" y="232" width="168" height="44"/>
  <text class="chip-title" x="438" y="251" text-anchor="middle">node_search</text>
  <text class="chip-text" x="438" y="269" text-anchor="middle">recall digest nodes</text>
  <rect class="chip" x="354" y="296" width="168" height="44"/>
  <text class="chip-title" x="438" y="315" text-anchor="middle">auto link</text>
  <text class="chip-text" x="438" y="333" text-anchor="middle">dedup + wikilinks</text>
  <rect class="chip" x="354" y="360" width="168" height="44"/>
  <text class="chip-title" x="438" y="379" text-anchor="middle">write digest</text>
  <text class="chip-text" x="438" y="397" text-anchor="middle">create / update nodes</text>

  <rect class="panel" x="598" y="132" width="224" height="300"/>
  <circle class="badge" cx="632" cy="170" r="15"/>
  <text class="step-num" x="632" y="174" text-anchor="middle">3</text>
  <text class="step-title" x="660" y="176">Topics</text>
  <text class="step-subtitle" x="626" y="206">dream_topics_step</text>
  <rect class="chip" x="626" y="232" width="168" height="44"/>
  <text class="chip-title" x="710" y="251" text-anchor="middle">merge candidates</text>
  <text class="chip-text" x="710" y="269" text-anchor="middle">same-day topics kept</text>
  <rect class="chip" x="626" y="296" width="168" height="44"/>
  <text class="chip-title" x="710" y="315" text-anchor="middle">avoid repeats</text>
  <text class="chip-text" x="710" y="333" text-anchor="middle">last 7 days by default</text>
  <rect class="chip" x="626" y="360" width="168" height="44"/>
  <text class="chip-title" x="710" y="379" text-anchor="middle">write interests.yaml</text>
  <text class="chip-text" x="710" y="397" text-anchor="middle">top 3 by default</text>

  <rect class="panel" x="870" y="132" width="224" height="300"/>
  <circle class="badge" cx="904" cy="170" r="15"/>
  <text class="step-num" x="904" y="174" text-anchor="middle">4</text>
  <text class="step-title" x="932" y="176">Finish</text>
  <text class="step-subtitle" x="898" y="206">dream_finish_step</text>
  <rect class="chip" x="898" y="232" width="168" height="44"/>
  <text class="chip-title" x="982" y="251" text-anchor="middle">checkpoint paths</text>
  <text class="chip-text" x="982" y="269" text-anchor="middle">skip failed inputs</text>
  <rect class="chip" x="898" y="296" width="168" height="44"/>
  <text class="chip-title" x="982" y="315" text-anchor="middle">persist catalog</text>
  <text class="chip-text" x="982" y="333" text-anchor="middle">file_catalog: dream</text>
  <rect class="chip" x="898" y="360" width="168" height="44"/>
  <text class="chip-title" x="982" y="379" text-anchor="middle">return summary</text>
  <text class="chip-text" x="982" y="397" text-anchor="middle">counts + errors</text>

  <path class="arrow" d="M278 282 H326"/>
  <path class="arrow" d="M550 282 H598"/>
  <path class="arrow" d="M822 282 H870"/>

  <rect class="panel" x="126" y="502" width="948" height="82"/>
  <text class="note" x="176" y="532">Inputs</text>
  <text class="chip-text" x="176" y="554">daily/&lt;date&gt;.md and daily/&lt;date&gt;/**/*.md</text>
  <line class="line" x1="404" y1="518" x2="404" y2="566"/>
  <text class="chip-title" x="448" y="532">Long-term memory</text>
  <text class="chip-text" x="448" y="554">digest/procedure, digest/personal, digest/wiki</text>
  <line class="line" x1="744" y1="518" x2="744" y2="566"/>
  <text class="chip-title" x="786" y="532">Proactive output</text>
  <text class="chip-text" x="786" y="554">daily/&lt;date&gt;/interests.yaml</text>

  <path class="soft-arrow" d="M982 432 C982 476 710 472 710 432"/>
  <text class="note" x="850" y="474" text-anchor="middle">proactive reads interests.yaml after auto_dream writes it</text>
</svg>
