service:
  backend: http
#  backend: mcp

# Default dev config points vault_dir at ./.reme so `python -m reme4 start`
# can be run from the repo root and exercise the full atomic-tool surface
# against the seeded test data. Override the `vault_dir=` CLI arg.
vault_dir: .reme
daily_dir: daily
digest_dir: digest
resource_dir: resource

jobs:
  # ════════════════════════════════════════════════════════════════════
  # UTILITY — service introspection
  # ════════════════════════════════════════════════════════════════════
  version:
    backend: base
    description: "return reme4 package version"
    parameters:
      type: object
      properties: {}
    steps:
      - backend: version_step

components:
  tokenizer:
    default:
      backend: regex

  embedding_model:
    default:
      backend: ${EMBEDDING_BACKEND:-openai}
      api_key: ${EMBEDDING_API_KEY:-}
      base_url: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      model_name: ${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      dimensions: 1024

  file_graph:
    default:
      backend: local

  file_parser:
    linked:
      backend: linked
      supported_extensions:
        - md
    chunked:
      backend: chunked
      supported_extensions:
        - txt
        - html
        - json
        - yaml
        - py
    default:
      backend: default

  keyword_index:
    default:
      backend: bm25
      tokenizer: default

  file_store:
    default:
      backend: local
      store_name: local
      embedding_model: default
      keyword_index: default
      file_graph: default
