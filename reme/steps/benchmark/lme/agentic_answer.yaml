user_message: |
  Please answer the user's question using the available history-search tools.

  Question Date: {question_date}
  Question: {question}

  Instructions:
  - Use search with the original question first.
  - If the original question does not return enough evidence, keep using search from multiple angles with keywords, aliases, dates, names, entities, and short phrases from the question or earlier results.
  - Do not give up easily. Continue searching until the tools stop returning new useful information.
  - Search results are deduplicated by the tools, so a search that returns no new information means those matching chunks have already been seen or no longer match.
  - Whenever you retrieve useful evidence, call add_draft to save the evidence or partial reasoning.
  - Before producing the final answer, call read_all_draft to review all saved evidence.
  - Answer only from the retrieved history and saved drafts. If the answer is not provided in history after exhaustive search, reply exactly: not provided in history
  - The final answer must be strictly grounded in the retrieved context and saved drafts. Do not infer or hallucinate unsupported facts.

user_message_zh: |
  请使用可用的历史检索工具回答用户的问题。

  问题日期：{question_date}
  问题：{question}

  指令：
  - 先使用 search 对原始问题进行检索。
  - 如果原始问题没有返回足够证据，继续使用 search 从多个维度检索：问题中的关键词、别名、日期、姓名、实体、短语，以及已有检索结果里的相关线索。
  - 不要轻易放弃。持续检索，直到工具不再返回新的有用信息。
  - 工具会对检索结果去重，因此某次搜索没有返回新信息，表示匹配片段已经看过或不再匹配。
  - 只要检索到有用证据，就调用 add_draft 保存证据或阶段性推理。
  - 输出最终答案前，调用 read_all_draft 回顾所有已保存证据。
  - 只能基于检索到的历史和已保存草稿回答。如果穷尽检索后历史中没有提供答案，准确回复：not provided in history
  - 最终答案必须严格基于检索上下文和已保存草稿，不要推断或编造没有证据支持的信息。
