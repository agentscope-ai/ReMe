service:
  backend: http

jobs:
  demo:
    backend: base
    description: "demo job description"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "query"
        min_score:
          type: number
          description: "min score"
          default: 0.5
      required:
        - query
    steps:
      - backend: demo_echo_step1
      - backend: demo_echo_step2

  add:
    backend: base
    description: "add two numbers"
    parameters:
      type: object
      properties:
        a:
          type: number
          description: "first addend"
        b:
          type: number
          description: "second addend"
      required:
        - a
        - b
    steps:
      - backend: add_step

  memory_time_range:
    backend: base
    description: "extract precise memory retrieval time range from a question"
    parameters:
      type: object
      properties:
        question:
          type: string
          description: "user question"
        question_date:
          type: string
          description: "reference date for relative time expressions, e.g. 2026-07-02"
      required:
        - question
        - question_date
    steps:
      - backend: memory_time_range_step

  context_answer:
    backend: base
    description: "answer a query strictly from provided context"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "user query"
        session_context:
          type: string
          description: "session context used as the only source of truth"
      required:
        - query
        - session_context
    steps:
      - backend: context_answer_step

  answer_judge:
    backend: base
    description: "judge whether an agent answer matches a golden answer"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "user query"
        agent_answer:
          type: string
          description: "answer generated by the agent"
        golden_answer:
          type: string
          description: "reference answer used as the source of truth"
      required:
        - query
        - agent_answer
        - golden_answer
    steps:
      - backend: answer_judge_step

  python_execute:
    backend: base
    description: "execute Python code and return printed output"
    parameters:
      type: object
      properties:
        code:
          type: string
          description: "Python code to execute; print the final result"
        timeout:
          type: number
          description: "execution timeout in seconds"
          default: 60
      required:
        - code
    steps:
      - backend: python_execute_step

  longmemeval_session_answer:
    backend: base
    description: "answer a LongMemEval query using only sibling session files"
    parameters:
      type: object
      properties:
        query_path:
          type: string
          description: "path to longmemeval/{index}/query.json"
      required:
        - query_path
    steps:
      - backend: longmemeval_session_answer_step
        agent_wrapper: claude_code

  stream_demo:
    backend: stream
    description: "stream demo job: repeat query 10x and stream char-by-char"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "query to echo"
        repeat:
          type: integer
          description: "number of times to repeat the query"
          default: 10
        interval:
          type: number
          description: "seconds between chunks"
          default: 0.1
      required:
        - query
    steps:
      - backend: stream_demo_step1
      - backend: stream_demo_step2

components:
  tokenizer:
    default:
      backend: regex

  as_embedding:
    default:
      backend: ${EMBEDDING_BACKEND:-openai}
      model: ${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      credential:
        api_key: ${EMBEDDING_API_KEY:-}
        base_url: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      parameters:
        dimensions: 1024

  embedding_store:
    default:
      backend: local
      as_embedding: default

  as_llm:
    default:
      backend: ${LLM_BACKEND:-openai}
      model: ${LLM_MODEL_NAME:-qwen3.7-plus}
      stream: true
      context_size: 200000
      max_retries: 3
      credential:
        api_key: ${LLM_API_KEY:-}
        base_url: ${LLM_BASE_URL:-}
      parameters:
        max_tokens: 65536
      extra_body:
        enable_thinking: false

  agent_wrapper:
    default:
      backend: agentscope
      as_llm: default
      permission_mode: bypass
      react_config:
        max_iters: 30
      context_config:
        trigger_ratio: 0.8
        reserve_ratio: 0.1
        tool_result_limit: 50000
      model_config:
        max_retries: 1
    claude_code:
      backend: claude_code
      model: ${CLAUDE_CODE_MODEL_NAME:-glm-5.1}
      api_key: ${CLAUDE_CODE_API_KEY:-}
      base_url: ${CLAUDE_CODE_BASE_URL:-https://dashscope.aliyuncs.com/apps/anthropic}
      permission_mode: bypassPermissions

  file_graph:
    default:
      backend: local

  file_catalog:
    default:
      backend: local
    resource:
      backend: local
    digest:
      backend: local
    dream:
      backend: local

  file_chunker:
    markdown:
      backend: markdown
      supported_extensions: [ "md" ]
    default:
      backend: default
      supported_extensions: [ "jsonl" ]

  keyword_index:
    default:
      backend: bm25
      tokenizer: default

  file_store:
    default:
      backend: local
      store_name: local
      #  embedding_store: default
      embedding_store: ""
      keyword_index: default
      file_graph: default
