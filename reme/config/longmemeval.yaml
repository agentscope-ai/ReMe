# LongMemEval evaluation config — based on default.yaml
# All background/cron jobs are converted to base (manually callable).
# Use with: resolve_app_config(config="longmemeval.yaml", ...)

service:
  backend: http

jobs:
  bench_query_job:
    backend: base
    description: "Benchmark query job"
    watch_dirs: []
    watch_suffixes: []
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "The query to ask"
        query_time:
          type: string
          description: "ISO timestamp representing the query time"
          default: ""
      required:
        - query
    steps:
      - backend: bench_query_step

  # ── Manual index update (replaces index_update_loop background) ──
  index_update:
    backend: base
    description: "Manually trigger incremental index update for watched dirs."
    watch_dirs: [daily_dir, digest_dir, resource_dir]
    watch_suffixes: [md, jsonl]
    parameters:
      type: object
      properties: {}
    steps:
      - backend: init_changes_step
        monitor_type: file_store
        monitor_name: default
        dispatch_steps: [update_index_step]

  # ── Manual digest catalog update (replaces digest_watch_loop background) ──
  digest_update:
    backend: base
    description: "Manually trigger digest catalog update."
    watch_dirs: [daily_dir, digest_dir]
    watch_suffixes: [md]
    parameters:
      type: object
      properties: {}
    steps:
      - backend: init_changes_step
        monitor_type: file_catalog
        monitor_name: digest
        dispatch_steps:
          - backend: update_catalog_step
            file_catalog: digest
          - backend: log_changes_step

  # ── Auto dream (same as default.yaml auto_dream, base mode) ──
  auto_dream:
    backend: base
    description: "Auto-dream: scan today's day-index and daily notes, globally extract merged units/topics, integrate digest units, write interests.yaml, and persist the dream catalog."
    parameters:
      type: object
      properties:
        date:
          type: string
          description: "YYYY-MM-DD to scan; defaults to today in the dreamer's timezone"
          default: ""
        hint:
          type: string
          description: "caller guidance passed through to dream extract/integrate"
          default: ""
        scan_days:
          type: integer
          description: "number of recent daily directories to scan, ending at date"
          default: 2
        max_units:
          type: integer
          description: "maximum number of extracted memory units"
          default: 5
        topic_count:
          type: integer
          description: "maximum number of final daily interest topics"
          default: 3
        topic_diversity_days:
          type: integer
          description: "number of previous interests.yaml days to avoid repeating"
          default: 7
    steps:
      - backend: dream_extract_step
        file_catalog: dream
        topic_session_id: interests
        scan_days: 2
        max_units: 5
      - backend: dream_integrate_step
      - backend: dream_topics_step
        topic_count: 3
        topic_diversity_days: 7
      - backend: dream_finish_step
        file_catalog: dream

  # ── Auto memory (same as default.yaml) ──
  auto_memory:
    backend: base
    description: "Auto-memory: record conversation facts into a daily note"
    parameters:
      type: object
      properties:
        messages:
          type: array
          description: "messages"
          items:
            type: object
        session_id:
          type: string
          description: "source conversation session identifier"
          default: ""
        memory_hint:
          type: string
          description: "optional hint"
        date:
          type: string
          description: "YYYY-MM-DD daily note date; empty = infer from message timestamps or today"
          default: ""
      required:
        - messages
    steps:
      - backend: auto_memory_step

  # ── Reindex (full rebuild) ──
  reindex:
    backend: base
    description: "wipe the file store and rebuild it from the existing files"
    watch_dirs: [daily_dir, digest_dir, resource_dir]
    watch_suffixes: [md, jsonl]
    parameters:
      type: object
      properties: {}
    steps:
      - backend: clear_store_step
      - backend: init_changes_step
        monitor_type: file_store
        monitor_name: default
        dispatch_steps: [update_index_step]

  # ── Search ──
  search:
    backend: base
    description: "Hybrid workspace search (vector + BM25, RRF-fused)."
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "search query"
        limit:
          type: integer
          description: "max results"
          default: 5
        min_score:
          type: number
          description: "min fused score"
          default: 0.0
      required:
        - query
    steps:
      - backend: search_step
        vector_weight: 0.7
        candidate_multiplier: 3.0
        expand_links: true
        max_links_per_direction: 10

  # ── File I/O jobs (needed by auto_memory agent tools) ──
  daily_list:
    backend: base
    description: "List notes under a single day."
    parameters:
      type: object
      properties:
        date:
          type: string
          description: "YYYY-MM-DD; empty = today"
          default: ""
    steps:
      - backend: daily_list_step

  daily_reindex:
    backend: base
    description: "Rebuild the day-index page daily/<date>.md."
    parameters:
      type: object
      properties:
        date:
          type: string
          description: "YYYY-MM-DD; empty = today"
          default: ""
    steps:
      - backend: daily_reindex_step

  frontmatter_update:
    backend: base
    description: "Merge key-values into a file's frontmatter."
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "workspace-relative path"
        metadata:
          type: object
          description: "key-values to merge"
      required:
        - path
        - metadata
    steps:
      - backend: frontmatter_update_step

  move:
    backend: base
    description: "Move / rename a workspace file."
    parameters:
      type: object
      properties:
        src_path:
          type: string
          description: "workspace-relative source"
        dst_path:
          type: string
          description: "workspace-relative destination"
        overwrite:
          type: boolean
          default: false
        retarget:
          type: boolean
          default: true
      required:
        - src_path
        - dst_path
    steps:
      - backend: move_step

  read:
    backend: base
    description: "Read a markdown file under the workspace."
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "workspace-relative path; markdown only"
        start_line:
          type: integer
        end_line:
          type: integer
      required:
        - path
    steps:
      - backend: read_step
        with_neighbors: false
        max_neighbors_per_direction: 10

  write:
    backend: base
    description: "Write a markdown file."
    parameters:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        description:
          type: string
        content:
          type: string
        metadata:
          type: object
      required:
        - path
        - name
        - description
        - content
    steps:
      - backend: write_step

  daily_write:
    backend: base
    description: "Write a daily markdown note."
    parameters:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        session_id:
          type: string
        content:
          type: string
        date:
          type: string
          default: ""
        metadata:
          type: object
      required:
        - name
        - description
        - session_id
        - content
    steps:
      - backend: daily_write_step

  edit:
    backend: base
    description: "Find-and-replace in a markdown file."
    parameters:
      type: object
      properties:
        path:
          type: string
        old:
          type: string
        new:
          type: string
          default: ""
      required:
        - path
        - old
        - new
    steps:
      - backend: edit_step

  frontmatter_read:
    backend: base
    description: "Read a file's frontmatter as a dict."
    parameters:
      type: object
      properties:
        path:
          type: string
      required:
        - path
    steps:
      - backend: frontmatter_read_step

  node_search:
    backend: base
    description: "Digest node recall."
    parameters:
      type: object
      properties:
        query:
          type: string
        limit:
          type: integer
          default: 20
      required:
        - query
    steps:
      - backend: node_search_step
        vector_weight: 0.7
        candidate_multiplier: 5.0

components:
  tokenizer:
    default:
      backend: regex

  as_embedding:
    default:
      backend: ${EMBEDDING_BACKEND:-openai}
      model: ${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      credential:
        api_key: ${EMBEDDING_API_KEY:-}
        base_url: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      parameters:
        dimensions: 1024

  embedding_store:
    default:
      backend: local
      as_embedding: default

  as_llm:
    default:
      backend: ${LLM_BACKEND:-openai}
      model: ${LLM_MODEL_NAME:-qwen3.6-flash}
      stream: true
      context_size: 200000
      max_retries: 3
      credential:
        api_key: ${LLM_API_KEY:-}
        base_url: ${LLM_BASE_URL:-}
      parameters:
        max_tokens: 65536
        thinking_enable: false
    judge:
      backend: ${LLM_BACKEND:-openai}
      model: ${JUDGE_MODEL_NAME:-qwen3.7-max}
      stream: false
      context_size: 32000
      max_retries: 3
      credential:
        api_key: ${LLM_API_KEY:-}
        base_url: ${LLM_BASE_URL:-}
      parameters:
        max_tokens: 2048
        thinking_enable: false

  agent_wrapper:
    default:
      backend: agentscope
      as_llm: default
      permission_mode: bypass
      react_config:
        max_iters: 30
      context_config:
        trigger_ratio: 0.8
        reserve_ratio: 0.1
        tool_result_limit: 50000
      model_config:
        max_retries: 1

  file_graph:
    default:
      backend: local

  file_catalog:
    default:
      backend: local
    resource:
      backend: local
    digest:
      backend: local
    dream:
      backend: local

  file_chunker:
    markdown:
      backend: markdown
      supported_extensions: ["md"]
    default:
      backend: default
      supported_extensions: ["jsonl"]

  keyword_index:
    default:
      backend: bm25
      tokenizer: default

  file_store:
    default:
      backend: local
      store_name: local
      embedding_store: default
      keyword_index: default
      file_graph: default
